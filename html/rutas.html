<section class="section section-soft routes-section reveal" id="rutas">
    <div class="container">
        <div class="section-heading routes-heading">
            <p class="chip">Mapa de Rutas</p>
            <h2>Rutas <span class="about-title-highlight">activas</span> del servidor</h2>
            <p class="routes-subtitle">Explora nuestras rutas interprovinciales. Presiona un viaje para ver su detalle.</p>
        </div>
        <div class="routes-layout">
            <article class="map-card">
                <div class="map-frame" id="routeMapFrame">
                    <div class="map-canvas" id="routeMapCanvas">
                        <img src="assets/img/mapa-peru.png" alt="Mapa del Perú con rutas activas">
                        <svg id="mapRoutesLayer" class="map-routes" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true"></svg>
                        <div id="mapMarkers" class="map-markers"></div>
                    </div>
                </div>
                <div class="map-controls" aria-label="Controles de mapa">
                    <button type="button" id="mapZoomIn" class="map-control-btn" aria-label="Acercar mapa">+</button>
                    <button type="button" id="mapZoomOut" class="map-control-btn" aria-label="Alejar mapa">-</button>
                    <button type="button" id="mapResetView" class="map-control-btn map-control-reset" aria-label="Centrar mapa">Centrar</button>
                </div>
                <p class="hint">Rutas visualizadas según la última actividad registrada en las últimas 72 horas. Puedes acercar y arrastrar el mapa.</p>
            </article>
            <article class="route-info-card">
                <div class="route-indicator">
                    <span class="pulse"></span>
                    <strong id="routeIndicator">Rutas activas en vivo</strong>
                </div>
                <div id="routeList" class="route-list"></div>
            </article>
        </div>
    </div>
</section>
