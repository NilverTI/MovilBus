[build]
functions = "netlify/functions"

[[headers]]
for = "/*"
[headers.values]
Access-Control-Allow-Origin = "*"

[[redirects]]
  from = "/api/trucky/*"
  to = "/.netlify/functions/trucky/api/v1/company/41407/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/trucky-user/*"
  to = "/.netlify/functions/trucky/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/mdcdev/*"
  to = "https://api.mdcdev.me/v2/peruserver/trucky/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/api/osrm/*"
  to = "https://router.project-osrm.org/route/v1/driving/:splat"
  status = 200
  force = true
